<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (!sessionStorage.getItem("reloaded")) {
        sessionStorage.setItem("reloaded", "true");
        location.reload();
      } else {
        sessionStorage.removeItem("reloaded");
      }
    });
  </script>
</head>

<body>
</body>

</html>
